server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Angular routing — always serve index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api calls to the backend container
    location /api/ {
        proxy_pass         http://ai-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        # Allow long-running requests (image/video gen)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Proxy static output files (images, videos)
    location /outputs/ {
        proxy_pass http://ai-backend:3000;
    }
}
